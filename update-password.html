<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Your Password</title>
    <link rel="stylesheet" href="site.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=National+Park:wght@200..800&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
</head>
<body class="brand-light-page auth-page">
    <header class="auth-brand-header">
        <a href="index.html" aria-label="Saintly home"><img src="assets/branding/saintly-full-logo.png" alt="Saintly"></a>
        <a href="index.html">Back to Saintly</a>
    </header>
    <div class="container">
    <h1 class="amc10title">Reset Your Password</h1>
    <div class="auth-card howworkcard">
        <h3 class="amc10subtitle ittyBitty">Choose a New Password</h3>
        <input type="password" id="new-password" placeholder="Enter new password" required />
        <input type="password" id="new-password-check" placeholder="Confirm Password" required />
        <button id="btn-update-password" class="start-practice">Save Password</button>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        let colorMode = 'light'

let colorModeTrue = localStorage.getItem("colorMode")
if  (colorModeTrue !== false){
       colorMode =  colorModeTrue
 if (colorMode === 'dark'){
                colorMode = 'dark';
                document.documentElement.style.colorScheme = 'dark'; 
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                document.getElementById('brightness')?.textContent = "sunny"
                localStorage.setItem("colorMode", "dark")
        } else {
                colorMode = 'light';
                document.documentElement.style.colorScheme = 'light';
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
                document.getElementById('brightness')?.textContent = "bedtime"
                localStorage.setItem("colorMode", "light")
        }
} else {
function toggleSystemTheme() {
  const root = document.documentElement;
  
  // 1. Check what the system preference is, or if it's already set
  if (!root.style.colorScheme) {
    // If it's not set yet, match the user's system preferences
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    root.style.colorScheme = prefersDark ? 'dark' : 'light';
  }
  
  colorMode = root.style.colorScheme;

  // 2. Add the correct matching class right away so the logos render correctly!
  if (colorMode === 'dark') {
      root.classList.add('dark');
      root.classList.remove('light');
  } else {
      root.classList.add('light');
      root.classList.remove('dark');
  }
}
toggleSystemTheme();
}
        // Use your project credentials
        const supabaseURL = 'https://joevkictcfaoofqhbhgw.supabase.co';
        const supabaseKey = 'sb_publishable_8Iat4psKXuFn91uT8yuw7g_2n3Buc5w'; 
        const supabase = window.supabase.createClient(supabaseURL, supabaseKey);

        document.getElementById("btn-update-password").addEventListener("click", async () => {
            const newPassword = document.getElementById("new-password").value;
            const confirmedPassword = document.getElementById("new-password-check").value;

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }
            if (newPassword !== confirmedPassword) {
                alert("Passwords do not match.");
                return;
            }

            // Update the password for the currently authenticated recovery session
            const { data, error } = await supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                alert("Update failed: " + error.message);
            } else {
                alert("Password updated successfully! Redirecting to home...");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
